    }
    
    .section-divider .line {
      flex: 1;
      height: 1px;
      background: var(--md-sys-color-outline);
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      HablaSlice <span id="fileCounter"></span>
    </h1>
    <button class="btn-icon" id="btnSettings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0 0 1.88l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.22 0 .43-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 15.6 12 3.6 3.6 0 0 1 12 15.6z"/></svg>
    </button>
  </header>

  <div class="status-bar">
    <div class="status-content">
      <span id="statusText">No file</span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText">0%</span>
    </div>
  </div>

  <div class="main" id="main">
    <div class="track-card">
      <div class="track-name" id="trackName">—</div>
      <div class="track-meta">
        <span class="seg-info" id="segInfo">Ready</span>
        <span class="repeat-chip">
          <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          <b id="repeatCount">1</b>/<span id="repeatTotal">3</span>
        </span>
      </div>
      <div class="time-info" id="timeInfo">0.0s / 0.0s</div>
      <div class="waveform-container">
        <canvas id="waveCanvas"></canvas>
        <div class="waveform-progress" id="waveProgress"></div>
      </div>
    </div>

    <div class="playlist" id="playlist"></div>
    <div class="empty-msg" id="emptyMsg">Open a file or folder to start</div>
  </div>

  <div class="controls-wrapper">
    <div class="quick-controls">
      <div class="qc-group">
        <span class="qc-label">Speed</span>
        <div class="custom-dropdown" id="speedDropdown">
          <div class="dropdown-toggle" id="speedToggle">
            <span id="speedDisplay">1.0x</span>
            <span class="arrow"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></span>
          </div>
          <div class="dropdown-menu" id="speedMenu">
            <div class="item" data-value="0.25">0.25x</div>
            <div class="item" data-value="0.5">0.5x</div>
            <div class="item" data-value="0.75">0.75x</div>
            <div class="item selected" data-value="1.0">1.0x</div>
            <div class="item" data-value="1.25">1.25x</div>
            <div class="item" data-value="1.5">1.5x</div>
            <div class="item" data-value="1.75">1.75x</div>
            <div class="item" data-value="2.0">2.0x</div>
          </div>
        </div>
      </div>
      <div class="qc-divider"></div>
      <div class="qc-group">
        <span class="qc-label">Repeats</span>
        <div class="custom-dropdown" id="repeatsDropdown">
          <div class="dropdown-toggle" id="repeatsToggle">
            <span id="repeatsDisplay">3</span>
            <span class="arrow"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></span>
          </div>
          <div class="dropdown-menu" id="repeatsMenu">
            <div class="item" data-value="1">1</div>
            <div class="item" data-value="2">2</div>
            <div class="item selected" data-value="3">3</div>
            <div class="item" data-value="4">4</div>
            <div class="item" data-value="5">5</div>
            <div class="item" data-value="6">6</div>
            <div class="item" data-value="7">7</div>
            <div class="item" data-value="8">8</div>
            <div class="item" data-value="9">9</div>
            <div class="item" data-value="10">10</div>
            <div class="item" data-value="15">15</div>
            <div class="item" data-value="20">20</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="ctrl-btn ctrl-btn-small" id="btnOpen" aria-label="Open">
        <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      </button>
      <div class="spacer"></div>
      <button class="ctrl-btn ctrl-btn-small" id="btnPrev" aria-label="Previous segment" disabled>
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <div class="spacer"></div>
      <button class="ctrl-btn play-btn" id="btnPlay" aria-label="Play" disabled>
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="spacer"></div>
      <button class="ctrl-btn ctrl-btn-small" id="btnNext" aria-label="Next segment" disabled>
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <div class="spacer"></div>
      <button class="ctrl-btn ctrl-btn-small" id="btnLoop" aria-label="Loop">
        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
      </button>
    </div>
  </div>

  <div class="popover" id="popover">
    <button class="popover-item" id="popFile">
      <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      Select File(s)
    </button>
    <button class="popover-item" id="popFolder">
      <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      Select Folder
    </button>
  </div>

  <input type="file" id="fileInput" accept="audio/*" multiple>
  <input type="file" id="folderInput" webkitdirectory multiple>

  <div class="modal-bg" id="settingsModal">
    <div class="modal">
      <h2>
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 0 0 0-1.88l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0 0 1.88l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.22 0 .43-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 15.6 12 3.6 3.6 0 0 1 12 15.6z"/></svg>
        Settings
      </h2>

      <div class="setting">
        <div class="label-row"><label>Theme</label></div>
        <div class="theme-switch">
          <button data-theme="dark" class="active" id="themeDark">Dark</button>
          <button data-theme="light" id="themeLight">Light</button>
        </div>
      </div>

      <div class="section-divider">
        <span>Segmentation</span>
        <div class="line"></div>
      </div>

      <div class="setting">
        <div class="label-row"><label>Silence (dB)</label><span class="value" id="dbVal">-32</span></div>
        <div class="slider-row">
          <button class="step-btn" data-target="setDb" data-dir="-1">−</button>
          <input type="range" id="setDb" min="-60" max="-10" value="-32">
          <button class="step-btn" data-target="setDb" data-dir="1">+</button>
        </div>
      </div>

      <div class="setting">
        <div class="label-row"><label>Min silence (sec)</label><span class="value" id="durVal">0.3</span></div>
        <div class="slider-row">
          <button class="step-btn" data-target="setDur" data-dir="-1">−</button>
          <input type="range" id="setDur" min="0.1" max="3" step="0.1" value="0.3">
          <button class="step-btn" data-target="setDur" data-dir="1">+</button>
        </div>
      </div>

      <div class="setting">
        <div class="label-row"><label>Padding (sec)</label><span class="value" id="padVal">0.50</span></div>
        <div class="slider-row">
          <button class="step-btn" data-target="setPad" data-dir="-1">−</button>
          <input type="range" id="setPad" min="0.1" max="1" step="0.05" value="0.5">
          <button class="step-btn" data-target="setPad" data-dir="1">+</button>
        </div>
        <div class="hint">Requires reload</div>
      </div>

      <div class="section-divider">
        <span>After file ends</span>
        <div class="line"></div>
      </div>

      <div class="setting">
        <div class="label-row"><label>Action</label></div>
        <select id="setAfter">
          <option value="loop">Loop file</option>
          <option value="next" selected>Next track</option>
          <option value="stop">Stop</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-reset" id="btnReset">↺</button>
        <button class="btn-secondary" id="btnCancel">Cancel</button>
        <button class="btn-primary" id="btnApply">Apply</button>
      </div>
    </div>
  </div>

  <audio id="audio-engine" preload="auto"></audio>

  <script>
    (function() {
      'use strict';

      // ============================================================
      // STATE
      // ============================================================
      const DEFAULTS = { n: 3, db: -32, dur: 0.3, pad: 0.5, after: 'next', theme: 'dark', speed: 1.0 };
      const state = {
        files: [],
        currentFileIdx: 0,
        segments: [],
        currentSegIdx: 0,
        repeatCount: 0,
        isPlaying: false,
        loopFile: false,
        originalFileUrl: null,
        analyzing: false,
        speed: DEFAULTS.speed,
        settings: {
          n: DEFAULTS.n,
          db: DEFAULTS.db,
          dur: DEFAULTS.dur,
          pad: DEFAULTS.pad,
          after: DEFAULTS.after,
          theme: DEFAULTS.theme
        },
        cache: {},
        isUserSeeking: false,
        mediaSessionInitialized: false,
        audioData: null,
        sampleRate: 44100,
        isTransitioning: false,
        loadPromise: null,
        audioContext: null,
        isLoading: false,
        isAnalyzing: false,
        _checking: false
      };

      // ============================================================
      // DOM refs
      // ============================================================
      const $ = id => document.getElementById(id);
      const el = {
        statusText: $('statusText'), progressWrap: $('progressWrap'), progressFill: $('progressFill'), progressText: $('progressText'),
        trackName: $('trackName'), segInfo: $('segInfo'), timeInfo: $('timeInfo'), repeatCount: $('repeatCount'), repeatTotal: $('repeatTotal'),
        playlist: $('playlist'), emptyMsg: $('emptyMsg'), btnOpen: $('btnOpen'), btnPrev: $('btnPrev'), btnPlay: $('btnPlay'),
        btnNext: $('btnNext'), btnLoop: $('btnLoop'), btnSettings: $('btnSettings'), fileInput: $('fileInput'), folderInput: $('folderInput'),
        settingsModal: $('settingsModal'), btnCancel: $('btnCancel'), btnApply: $('btnApply'), btnReset: $('btnReset'),
        setDb: $('setDb'), setDur: $('setDur'), setPad: $('setPad'), setAfter: $('setAfter'),
        dbVal: $('dbVal'), durVal: $('durVal'), padVal: $('padVal'), waveCanvas: $('waveCanvas'), waveProgress: $('waveProgress'),
        themeDark: $('themeDark'), themeLight: $('themeLight'),
        popover: $('popover'), popFile: $('popFile'), popFolder: $('popFolder'), audio: $('audio-engine'), fileCounter: $('fileCounter'),
        speedDisplay: $('speedDisplay'), repeatsDisplay: $('repeatsDisplay'),
        speedDropdown: $('speedDropdown'), repeatsDropdown: $('repeatsDropdown'),
        speedMenu: $('speedMenu'), repeatsMenu: $('repeatsMenu'),
        speedToggle: $('speedToggle'), repeatsToggle: $('repeatsToggle')
      };

      // ============================================================
      // Custom Dropdown
      // ============================================================
      function initDropdown(dropdownEl, menuEl, toggleEl, displayEl, onSelect) {
        let isOpen = false;
        
        toggleEl.addEventListener('click', function(e) {
          e.stopPropagation();
          isOpen = !isOpen;
          dropdownEl.classList.toggle('open', isOpen);
        });
        
        menuEl.querySelectorAll('.item').forEach(item => {
          item.addEventListener('click', function(e) {
            e.stopPropagation();
            const value = this.dataset.value;
            const label = this.textContent.trim();
            
            menuEl.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
            this.classList.add('selected');
            
            displayEl.textContent = label;
            dropdownEl.classList.remove('open');
            isOpen = false;
            
            if (onSelect) onSelect(value);
          });
        });
        
        document.addEventListener('click', function(e) {
          if (!dropdownEl.contains(e.target)) {
            dropdownEl.classList.remove('open');
            isOpen = false;
          }
        });
      }

      // ============================================================
      // Settings
      // ============================================================
      function loadSettings() {
        try {
          const s = JSON.parse(localStorage.getItem('hs_settings'));
          if (s) { Object.assign(state.settings, s); if (s.speed !== undefined) state.speed = s.speed; }
        } catch(e) {}
        applySettingsToUI();
      }
      
      function saveSettings() { 
        const data = { ...state.settings, speed: state.speed }; 
        localStorage.setItem('hs_settings', JSON.stringify(data)); 
      }
      
      function applySettingsToUI() {
        document.body.classList.toggle('light', state.settings.theme === 'light');
        el.setDb.value = state.settings.db;
        el.setDur.value = state.settings.dur;
        el.setPad.value = state.settings.pad;
        el.setAfter.value = state.settings.after;
        
        el.dbVal.textContent = state.settings.db;
        el.durVal.textContent = parseFloat(state.settings.dur).toFixed(1);
        el.padVal.textContent = parseFloat(state.settings.pad).toFixed(2);
        el.repeatTotal.textContent = state.settings.n;
        el.themeDark.classList.toggle('active', state.settings.theme === 'dark');
        el.themeLight.classList.toggle('active', state.settings.theme === 'light');
        
        const speedLabel = state.speed.toFixed(2).replace(/\.?0+$/, '') + 'x';
        el.speedDisplay.textContent = speedLabel;
        el.repeatsDisplay.textContent = state.settings.n;
        
        el.speedMenu.querySelectorAll('.item').forEach(item => {
          item.classList.toggle('selected', parseFloat(item.dataset.value) === state.speed);
        });
        el.repeatsMenu.querySelectorAll('.item').forEach(item => {
          item.classList.toggle('selected', parseInt(item.dataset.value) === state.settings.n);
        });
        
        updateRepeatInfo();
        
        if (el.audio) {
          el.audio.playbackRate = state.speed;
        }
      }
      
      function resetToDefaults() {
        state.settings.n = DEFAULTS.n; state.settings.db = DEFAULTS.db; state.settings.dur = DEFAULTS.dur;
        state.settings.pad = DEFAULTS.pad; state.settings.after = DEFAULTS.after; state.settings.theme = DEFAULTS.theme;
        state.speed = DEFAULTS.speed;
        saveSettings(); applySettingsToUI(); updateRepeatInfo();
        if (state.files.length > 0 && state.currentFileIdx < state.files.length) {
          reanalyzeCurrentFile();
        }
      }

      // ============================================================
      // Progress & UI
      // ============================================================
      function showProgress(show) { el.progressWrap.classList.toggle('active', show); if (!show) { el.progressFill.style.width = '0%'; el.progressText.textContent = '0%'; } }
      function setProgress(pct, text) { el.progressFill.style.width = pct + '%'; el.progressText.textContent = text || (Math.round(pct) + '%'); }
      const yieldUI = () => new Promise(r => setTimeout(r, 0));

      function updateStatusText(text, showSpinner = false) {
        if (text) {
          if (showSpinner) {
            el.statusText.innerHTML = `<span class="spinner-small"></span> ${text}`;
          } else {
            el.statusText.textContent = text;
          }
          return;
        }
        if (state.analyzing || state.isAnalyzing) {
          el.statusText.innerHTML = `<span class="spinner-small"></span> Processing...`;
          return;
        }
        if (state.segments.length > 0) {
          el.statusText.textContent = 'Ready';
        } else if (state.files.length === 0) {
          el.statusText.textContent = 'No file';
        } else {
          el.statusText.textContent = 'Ready';
        }
      }

      function updateSegInfo() {
        if (state.segments.length === 0) { el.segInfo.textContent = 'Ready'; return; }
        const idx = state.currentSegIdx + 1;
        el.segInfo.textContent = `Segment ${idx} of ${state.segments.length}`;
      }

      function updateRepeatInfo() {
        const displayCount = Math.min(state.repeatCount + 1, state.settings.n);
        el.repeatCount.textContent = displayCount;
        el.repeatTotal.textContent = state.settings.n;
      }

      function updatePlayBtn() {
        const icon = state.isPlaying ? 'pause' : 'play';
        el.btnPlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="${icon === 'play' ? 'M8 5v14l11-7z' : 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'}"/></svg>`;
        const disabled = state.segments.length === 0 || state.isLoading || state.isAnalyzing;
        el.btnPlay.disabled = disabled;
        el.btnPrev.disabled = disabled;
        el.btnNext.disabled = disabled;
      }

      function updateFileList() {
        if (state.files.length <= 1) {
          el.playlist.innerHTML = '';
          el.emptyMsg.style.display = state.files.length === 0 ? 'block' : 'none';
          el.fileCounter.textContent = state.files.length > 0 ? `[${state.currentFileIdx+1}/${state.files.length}]` : '';
          return;
        }
        el.emptyMsg.style.display = 'none';
        el.fileCounter.textContent = `[${state.currentFileIdx+1}/${state.files.length}]`;
        el.playlist.innerHTML = state.files.map((f, i) => `
          <div class="playlist-item ${i === state.currentFileIdx ? 'current' : ''}" data-idx="${i}">
            <span class="idx">${i+1}</span>
            <span class="name">${f.name}</span>
            <span class="status-dot"></span>
          </div>
        `).join('');
        el.playlist.querySelectorAll('.playlist-item').forEach(item => {
          item.addEventListener('click', () => {
            const idx = parseInt(item.dataset.idx);
            if (idx !== state.currentFileIdx) loadFile(idx);
          });
        });
      }

      // ============================================================
      // WAVEFORM
      // ============================================================
      function drawWaveform(segIdx, segments) {
        if (!state.audioData || segments.length === 0) return;
        const seg = segments[segIdx] || segments[0];
        // Use content boundaries for waveform (not padded boundaries)
        const startSample = Math.floor(seg.contentStart * state.sampleRate);
        const endSample = Math.floor(seg.contentEnd * state.sampleRate);
        const data = state.audioData.slice(startSample, endSample);
        
        const canvas = el.waveCanvas;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.scale(dpr, dpr);

        if (data.length === 0) {
          ctx.clearRect(0, 0, w, h);
          return;
        }

        const step = Math.max(1, Math.floor(data.length / (w * 1.5)));
        const amp = h / 1.8;
        ctx.clearRect(0, 0, w, h);

        const color = getComputedStyle(document.documentElement).getPropertyValue('--md-sys-color-primary').trim() || '#4cc9f0';
        const colorDim = color + '22';
        
        const points = [];
        for (let i = 0; i < w; i++) {
          const idx = Math.floor(i * step);
          let sum = 0;
          const limit = Math.min(idx + step, data.length);
          for (let j = idx; j < limit; j++) {
            sum += Math.abs(data[j]);
          }
          const val = sum / step;
          const top = Math.max(0, (h / 2) - val * amp);
          const bottom = Math.min(h, (h / 2) + val * amp);
          points.push({ top, bottom, val });
        }

        ctx.beginPath();
        ctx.moveTo(0, h/2);
        for (let i = 0; i < points.length; i++) {
          ctx.lineTo(i, points[i].top);
        }
        for (let i = points.length - 1; i >= 0; i--) {
          ctx.lineTo(i, points[i].bottom);
        }
        ctx.closePath();
        
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, color + '33');
        grad.addColorStop(0.3, color + '55');
        grad.addColorStop(0.5, color + '77');
        grad.addColorStop(0.7, color + '55');
        grad.addColorStop(1, color + '33');
        ctx.fillStyle = grad;
        ctx.fill();
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        for (let i = 0; i < points.length; i++) {
          if (i === 0) ctx.moveTo(i, points[i].top);
          else ctx.lineTo(i, points[i].top);
        }
        ctx.stroke();
        
        ctx.beginPath();
        for (let i = 0; i < points.length; i++) {
          if (i === 0) ctx.moveTo(i, points[i].bottom);
          else ctx.lineTo(i, points[i].bottom);
        }
        ctx.stroke();
        
        ctx.beginPath();
        ctx.strokeStyle = colorDim;
        ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 4]);
        ctx.moveTo(0, h/2);
        ctx.lineTo(w, h/2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // ============================================================
      // FIXED SEGMENTATION - CORRECT PADDING
      // ============================================================
      function getFileKey(file) { return file.name + '_' + file.size + '_' + file.lastModified; }



async function analyzeFile(file) {
  const key = getFileKey(file);
  if (state.cache[key] && state.cache[key + '_settings'] === JSON.stringify(state.settings)) {
    state.audioData = state.cache[key + '_data'] || null;
    state.sampleRate = state.cache[key + '_rate'] || 44100;
    return state.cache[key];
  }
  
  state.isAnalyzing = true; state.analyzing = true;
  updateStatusText('Reading file...', true); showProgress(true); setProgress(2, '…'); updatePlayBtn();
  await yieldUI();
  
  const arrayBuffer = await file.arrayBuffer();
  setProgress(10, 'Decoding…'); updateStatusText('Decoding audio...', true);
  await yieldUI();
  
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  state.audioContext = audioCtx;
  
  let audioBuffer;
  try { audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0)); } 
  catch(e) { 
    updateStatusText('Decode error'); showProgress(false); 
    state.isAnalyzing = false; state.analyzing = false; updatePlayBtn();
    return []; 
  }
  
  // Сохраняем сам декодированный буфер в state, чтобы играть напрямую из памяти!
  state.currentAudioBuffer = audioBuffer; 
  
  setProgress(20, 'Analyzing…'); updateStatusText('Analyzing silence...', true); await yieldUI();
  
  const { db, dur, pad } = state.settings;
  const threshold = Math.pow(10, db / 20);
  const channelData = audioBuffer.getChannelData(0);
  const sampleRate = audioBuffer.sampleRate;
  const totalSamples = channelData.length;
  const duration = audioBuffer.duration;
  
  state.audioData = channelData;
  state.sampleRate = sampleRate;
  state.cache[key + '_data'] = channelData;
  state.cache[key + '_rate'] = sampleRate;
  state.cache[key + '_settings'] = JSON.stringify(state.settings);
  
  const windowSize = Math.floor(sampleRate * 0.008);
  const hopSize = Math.floor(windowSize / 2);
  const totalWindows = Math.floor((totalSamples - windowSize) / hopSize) + 1;
  
  const rms = new Float32Array(totalWindows);
  for (let w = 0; w < totalWindows; w++) {
    const start = w * hopSize; let sum = 0;
    const end = Math.min(start + windowSize, totalSamples);
    for (let i = start; i < end; i++) { const v = channelData[i]; sum += v * v; }
    rms[w] = Math.sqrt(sum / (end - start));
  }
  
  const enterThreshold = threshold * 1.02;
  const exitThreshold = threshold * 0.9;
  
  const silenceRegions = []; let inSilence = false; let silenceStartIdx = 0; let silenceSamplesCount = 0;
  
  for (let i = 0; i < rms.length; i++) {
    const isSilent = rms[i] < enterThreshold;
    if (isSilent) {
      if (!inSilence) { inSilence = true; silenceStartIdx = i; silenceSamplesCount = 1; } 
      else { silenceSamplesCount++; }
    } else {
      if (inSilence) {
        const silenceDuration = (silenceSamplesCount * hopSize) / sampleRate;
        if (silenceDuration >= dur) {
          let exitIdx = i;
          for (let j = i; j < Math.min(i + 30, rms.length); j++) { if (rms[j] > exitThreshold) { exitIdx = j; break; } }
          const startTime = (silenceStartIdx * hopSize) / sampleRate;
          const endTime = (exitIdx * hopSize) / sampleRate;
          silenceRegions.push({ start: Math.max(0, startTime), end: Math.min(duration, endTime) });
        }
        inSilence = false; silenceSamplesCount = 0;
      }
    }
  }
  
  if (inSilence) {
    const silenceDuration = (silenceSamplesCount * hopSize) / sampleRate;
    if (silenceDuration >= dur) {
      const startTime = (silenceStartIdx * hopSize) / sampleRate;
      silenceRegions.push({ start: Math.max(0, startTime), end: duration });
    }
  }
  
  setProgress(88, 'Building…'); updateStatusText('Building segments...', true); await yieldUI();
  
  const mergedRegions = [];
  for (const region of silenceRegions) {
    if (mergedRegions.length === 0) { mergedRegions.push(region); } 
    else {
      const last = mergedRegions[mergedRegions.length - 1];
      if (region.start - last.end < 0.03) { last.end = Math.max(last.end, region.end); } 
      else { mergedRegions.push(region); }
    }
  }
  
  const rawSegments = []; let prevEnd = 0;
  for (const region of mergedRegions) {
    let segmentStart = prevEnd; let segmentEnd = region.start;
    if (segmentEnd - segmentStart > 0.08) { rawSegments.push({ start: segmentStart, end: segmentEnd }); }
    prevEnd = region.end;
  }
  if (duration - prevEnd > 0.08) { rawSegments.push({ start: prevEnd, end: duration }); }
  if (rawSegments.length === 0) { rawSegments.push({ start: 0, end: duration }); }
  
  const segmentsWithPadding = [];
  for (let i = 0; i < rawSegments.length; i++) {
    const seg = rawSegments[i];
    let playStart = Math.max(0, seg.start - pad);
    let playEnd = Math.min(duration, seg.end + pad);
    
    if (i > 0 && playStart < segmentsWithPadding[i-1].end) playStart = segmentsWithPadding[i-1].end;
    if (i < rawSegments.length - 1 && playEnd > rawSegments[i+1].start) playEnd = rawSegments[i+1].start;
    
    segmentsWithPadding.push({
      start: playStart,
      end: playEnd,
      contentStart: seg.start,
      contentEnd: seg.end,
    });
  }
  
  state.cache[key] = segmentsWithPadding;
  state.isAnalyzing = false; state.analyzing = false; showProgress(false); updateStatusText('Ready'); updatePlayBtn();
  return segmentsWithPadding;
}



      // ============================================================
      // REANALYZE
      // ============================================================
      async function reanalyzeCurrentFile() {
        if (state.files.length === 0 || state.currentFileIdx >= state.files.length) return;
        const file = state.files[state.currentFileIdx];
        const key = getFileKey(file);
        delete state.cache[key];
        delete state.cache[key + '_data'];
        delete state.cache[key + '_rate'];
        delete state.cache[key + '_settings'];
        
        const wasPlaying = state.isPlaying;
        state.isPlaying = false;
        updatePlayBtn();
        
        state.segments = await analyzeFile(file);
        state.currentSegIdx = 0;
        state.repeatCount = 0;
        
        if (state.segments.length > 0) {
          const firstSeg = getCurrentSegment();
          el.audio.currentTime = firstSeg.start;
          drawWaveform(0, state.segments);
        }
        
        updateSegInfo();
        updateRepeatInfo();
        updateFileList();
        updateStatusText('Ready');
        
        if (wasPlaying && state.segments.length > 0) {
          try {
            await el.audio.play();
            state.isPlaying = true;
            updatePlayBtn();
          } catch(e) {
            state.isPlaying = false;
          }
        }
        updateMediaSession();
        savePlaybackState();
      }

      // ============================================================
      // PLAYBACK - FIXED AUTO ADVANCE
      // ============================================================
      
      function getCurrentSegment() {
        if (state.segments.length === 0 || state.currentSegIdx >= state.segments.length) {
          return { start: 0, end: 0, contentStart: 0, contentEnd: 0 };
        }
        return state.segments[state.currentSegIdx];
      }

function playCurrentBufferSegment() {
  // Если звук уже играет, останавливаем прошлый источник, чтобы не накладывался
  if (state.currentSourceNode) {
    try { state.currentSourceNode.stop(); } catch(e) {}
  }

  if (!state.isPlaying || !state.currentAudioBuffer || state.segments.length === 0) return;

  const seg = getCurrentSegment();
  const ctx = state.audioContext;
  
  // Создаем чистый звуковой узел напрямую в памяти
  const source = ctx.createBufferSource();
  source.buffer = state.currentAudioBuffer;
  source.connect(ctx.destination);
  
  const duration = seg.end - seg.start;
  
  // Запуск строго с таймкода сегмента и строго на его длительность
  source.start(0, seg.start, duration);
  state.currentSourceNode = source;

  // Как только этот кусок ИДЕАЛЬНО доиграет до конца (на нижайшем системном уровне)
  source.onended = () => {
    // Проверяем, не нажал ли пользователь паузу за это время
    if (!state.isPlaying || state.currentSourceNode !== source) return;

    state.repeatCount++;
    
    if (state.repeatCount >= state.settings.n) {
      state.repeatCount = 0;
      const nextIdx = state.currentSegIdx + 1;
      
      if (nextIdx >= state.segments.length) {
        handleFileEnd();
        return;
      } else {
        state.currentSegIdx = nextIdx;
      }
    }

    // РЕГУЛИРОВКА ТИШИНЫ: Сюда передается чистая пауза в миллисекундах
    const silenceMs = (state.settings.pad || 0.5) * 1000;

    // Сдвигаем интерфейс
    drawWaveform(state.currentSegIdx, state.segments);
    updateSegInfo(); updateRepeatInfo(); updateMediaSession();

    // Ждем время тишины и запускаем следующий фрагмент мгновенно
    setTimeout(() => {
      playCurrentBufferSegment();
    }, silenceMs);
  };
}


      function handleFileEnd() {
        if (state.isTransitioning) return;
        state.isTransitioning = true;
        
        try {
          if (state.settings.after === 'loop' || state.loopFile) {
            state.currentSegIdx = 0;
            state.repeatCount = 0;
            const firstSeg = getCurrentSegment();
            el.audio.currentTime = firstSeg.start;
            drawWaveform(0, state.segments);
            updateSegInfo();
            updateRepeatInfo();
            updateMediaSession();
            if (!state.isPlaying) {
              el.audio.play().catch(() => {});
              state.isPlaying = true;
              updatePlayBtn();
            }
          } else if (state.settings.after === 'next') {
            const nextIdx = state.currentFileIdx + 1;
            if (nextIdx < state.files.length) { 
              loadFile(nextIdx); 
            } else if (state.files.length > 1) { 
              loadFile(0); 
            } else {
              el.audio.pause();
              state.isPlaying = false;
              updatePlayBtn();
              updateStatusText('Finished');
              updateMediaSession();
            }
          } else {
            el.audio.pause();
            state.isPlaying = false;
            updatePlayBtn();
            updateStatusText('Finished');
            updateMediaSession();
          }
        } finally {
          setTimeout(() => { 
            state.isTransitioning = false; 
          }, 100);
        }
      }

      // ============================================================
      // LOAD FILE
      // ============================================================
      async function loadFile(idx, crossfade = false) {
        if (idx < 0 || idx >= state.files.length) return;
        if (state.isLoading) {
          try { await state.loadPromise; } catch(e) {}
          if (state.currentFileIdx === idx) return;
        }
        
        state.isLoading = true;
        state.isTransitioning = true;
        const wasPlaying = state.isPlaying;
        
        state.loadPromise = (async () => {
          try {
            state.currentFileIdx = idx;
            const file = state.files[idx];
            el.trackName.textContent = file.name;
            updateStatusText('Loading...', true);
            el.emptyMsg.style.display = 'none';

            if (crossfade && wasPlaying) {
              await fadeVolume(1, 0, 150);
            }
            
            try {
              el.audio.pause();
              el.audio.removeAttribute('src');
              el.audio.load();
            } catch(e) {}
            
            state.isPlaying = false;
            updatePlayBtn();

            if (state.originalFileUrl) {
              URL.revokeObjectURL(state.originalFileUrl);
              state.originalFileUrl = null;
            }

            state.segments = [];
            state.currentSegIdx = 0;
            state.repeatCount = 0;
            updateFileList();
            updateSegInfo();
            updateRepeatInfo();

            state.segments = await analyzeFile(file);
            if (state.segments.length === 0) { 
              updateStatusText('No segments'); 
              state.isLoading = false;
              state.isTransitioning = false;
              updatePlayBtn();
              return; 
            }
            
            state.originalFileUrl = URL.createObjectURL(file);
            el.audio.src = state.originalFileUrl;
            el.audio.loop = false;
            el.audio.playbackRate = state.speed;
            el.audio.preload = 'auto';
            
            await new Promise((resolve) => {
              if (el.audio.readyState >= 1) { resolve(); }
              else {
                const onLoaded = () => { el.audio.removeEventListener('loadedmetadata', onLoaded); resolve(); };
                el.audio.addEventListener('loadedmetadata', onLoaded);
                setTimeout(resolve, 2000);
              }
            });
            
            state.currentSegIdx = 0;
            state.repeatCount = 0;
            updateStatusText('Ready');
            
            const firstSeg = getCurrentSegment();
            el.audio.currentTime = firstSeg.start;
            
            drawWaveform(0, state.segments);
            
            setupMediaSession();
            updateMediaSession();
            
            if (wasPlaying) {
              try {
                await el.audio.play();
                state.isPlaying = true;
                if (crossfade) {
                  el.audio.volume = 0;
                  await fadeVolume(0, 1, 150);
                }
              } catch(e) {
                state.isPlaying = false;
              }
            }
            
            updatePlayBtn();
            updateSegInfo();
            updateRepeatInfo();
            updateFileList();
            
            savePlaybackState();
            
          } catch(e) { 
            console.error('Load error:', e); 
            updateStatusText('Error: ' + e.message); 
          } finally {
            setTimeout(() => { 
              state.isTransitioning = false; 
              state.isLoading = false;
              state.loadPromise = null;
              updatePlayBtn();
            }, 100);
          }
        })();
        
        await state.loadPromise;
      }

      // ============================================================
      // CROSSFADE HELPER
      // ============================================================
      function fadeVolume(from, to, duration) {
        return new Promise((resolve) => {
          const start = Date.now();
          const steps = 15;
          const stepDuration = duration / steps;
          
          const fadeStep = () => {
            const elapsed = Date.now() - start;
            const progress = Math.min(elapsed / duration, 1);
            const eased = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
            el.audio.volume = from + (to - from) * eased;
            
            if (progress < 1) {
              setTimeout(fadeStep, stepDuration);
            } else {
              el.audio.volume = to;
              resolve();
            }
          };
          
          fadeStep();
        });
      }

      // ============================================================
      // SAVE / RESTORE STATE
      // ============================================================
      function savePlaybackState() {
        try {
          if (state.files.length === 0) return;
          const data = {
            fileNames: state.files.map(f => f.name),
            currentFileIdx: state.currentFileIdx,
            currentSegIdx: state.currentSegIdx,
            repeatCount: state.repeatCount,
            settings: state.settings,
            speed: state.speed
          };
          localStorage.setItem('hs_playback_state', JSON.stringify(data));
        } catch(e) {}
      }

      function restorePlaybackState() {
        try {
          const raw = localStorage.getItem('hs_playback_state');
          if (!raw) return false;
          const data = JSON.parse(raw);
          if (!data.fileNames || data.fileNames.length === 0) return false;
          
          if (state.files.length === 0) return false;
          
          const fileMap = {};
          state.files.forEach(f => { fileMap[f.name] = f; });
          
          const allPresent = data.fileNames.every(name => fileMap[name]);
          if (!allPresent) return false;
          
          const restoredFiles = data.fileNames.map(name => fileMap[name]);
          state.files = restoredFiles;
          state.currentFileIdx = Math.min(data.currentFileIdx, state.files.length - 1);
          
          loadFile(state.currentFileIdx).then(() => {
            state.currentSegIdx = Math.min(data.currentSegIdx, state.segments.length - 1);
            state.repeatCount = data.repeatCount || 0;
            if (state.segments.length > 0) {
              const seg = getCurrentSegment();
              el.audio.currentTime = seg.start;
              drawWaveform(state.currentSegIdx, state.segments);
            }
            updateSegInfo();
            updateRepeatInfo();
            updateFileList();
          });
          
          return true;
        } catch(e) { return false; }
      }

      // ============================================================
      // CONTROLS
      // ============================================================
      function togglePlay() {
        if (state.segments.length === 0 || state.isTransitioning || state.isLoading || state.isAnalyzing) return;
        if (state.isPlaying) {
          el.audio.pause();
          state.isPlaying = false;
        } else {
          const seg = getCurrentSegment();
          el.audio.currentTime = seg.start;
          el.audio.play().catch(() => {});
          state.isPlaying = true;
        }
        updatePlayBtn();
        updateMediaSession();
        savePlaybackState();
      }

      function prevSegment() {
        if (state.segments.length === 0 || state.isTransitioning || state.isLoading || state.isAnalyzing) return;
        const newIdx = Math.max(0, state.currentSegIdx - 1);
        state.currentSegIdx = newIdx;
        state.repeatCount = 0;
        const seg = getCurrentSegment();
        el.audio.currentTime = seg.start;
        drawWaveform(state.currentSegIdx, state.segments);
        updateSegInfo();
        updateRepeatInfo();
        updateMediaSession();
        savePlaybackState();
      }

      function nextSegment() {
        if (state.segments.length === 0 || state.isTransitioning || state.isLoading || state.isAnalyzing) return;
        const newIdx = state.currentSegIdx + 1;
        if (newIdx >= state.segments.length) {
          if (state.files.length > 1 && state.currentFileIdx < state.files.length - 1) {
            loadFile(state.currentFileIdx + 1, true);
          } else if (state.files.length > 1) {
            loadFile(0, true);
          } else {
            state.currentSegIdx = 0;
            state.repeatCount = 0;
            const seg = getCurrentSegment();
            el.audio.currentTime = seg.start;
            drawWaveform(state.currentSegIdx, state.segments);
            updateSegInfo();
            updateRepeatInfo();
            updateMediaSession();
          }
        } else {
          state.currentSegIdx = newIdx;
          state.repeatCount = 0;
          const seg = getCurrentSegment();
          el.audio.currentTime = seg.start;
          drawWaveform(state.currentSegIdx, state.segments);
          updateSegInfo();
          updateRepeatInfo();
          updateMediaSession();
          savePlaybackState();
        }
      }
function advanceToNextSegment() {
  if (state._checking || state.isTransitioning || state.isLoading || state.isAnalyzing) {
    return;
  }
  
  state._checking = true;
  
  try {
    if (state.segments.length === 0 || !state.isPlaying) {
      state._checking = false;
      return;
    }
    
    const seg = getCurrentSegment();
    const currentTime = el.audio.currentTime;
    const endTime = seg.end;
    const startTime = seg.start;
    
    if (currentTime < startTime - 0.01) {
      el.audio.currentTime = startTime;
      state._checking = false;
      return;
    }
    
    // Проверяем, дошли ли до конца текущего сегмента
    if (currentTime >= endTime - 0.01) {
      state.isTransitioning = true; // Блокируем повторные срабатывания

      // МГНОВЕННО УБИРАЕМ ЗВУК В 0 (Защита от наложения)
      el.audio.volume = 0; 

      // Увеличиваем счетчик повторов
      state.repeatCount++;
      
      // Проверяем, нужно ли перейти к следующему сегменту
      if (state.repeatCount >= state.settings.n) {
        state.repeatCount = 0;
        const nextIdx = state.currentSegIdx + 1;
        
        if (nextIdx >= state.segments.length) {
          el.audio.volume = 1; // Возвращаем громкость
          state._checking = false;
          state.isTransitioning = false;
          handleFileEnd();
          return;
        } else {
          state.currentSegIdx = nextIdx;
        }
      }
      
      // Получаем новый сегмент и перематываем на его начало
      const targetSeg = getCurrentSegment();
      el.audio.currentTime = targetSeg.start;
      
      // Обновляем весь интерфейс
      drawWaveform(state.currentSegIdx, state.segments);
      updateSegInfo();
      updateRepeatInfo();
      updateMediaSession();
      
      // ВРЕМЯ ТИШИНЫ (в миллисекундах)
      // Плеер будет стоять на месте с нулевой громкостью заданное время
      const silenceDurationMs = (state.settings.pad || 0.5) * 1000;
      
      // Запускаем таймер тишины
      setTimeout(() => {
        // Проверяем, завершил ли браузер физическую перемотку (seek) файла
        const restoreAudio = () => {
          if (state.isPlaying) {
            el.audio.volume = 1; // Возвращаем громкость обратно
          }
          state.isTransitioning = false; // Снимаем блокировку
        };

        if (el.audio.seeking) {
          // Если браузер еще перематывает, ждем окончания
          el.audio.addEventListener('seeked', restoreAudio, { once: true });
        } else {
          restoreAudio();
        }
      }, silenceDurationMs);
      
      state._checking = false;
      return;
    }
    
    state._checking = false;
    
  } catch(e) {
    console.error('Advance error:', e);
    el.audio.volume = 1; // Возврат громкости при ошибке
    state._checking = false;
    state.isTransitioning = false;
  }
}

      // ============================================================
      // MEDIA SESSION API
      // ============================================================
      function setupMediaSession() {
        if (!('mediaSession' in navigator)) return;
        
        updateMediaSession();
        
        try {
          navigator.mediaSession.setActionHandler('play', null);
          navigator.mediaSession.setActionHandler('pause', null);
          navigator.mediaSession.setActionHandler('previoustrack', null);
          navigator.mediaSession.setActionHandler('nexttrack', null);
          navigator.mediaSession.setActionHandler('seekbackward', null);
          navigator.mediaSession.setActionHandler('seekforward', null);
        } catch(e) {}
        
        const actions = {
          'play': () => { 
            if (!state.isTransitioning && !state.isLoading && !state.isAnalyzing) {
              el.audio.play(); 
              state.isPlaying = true; 
              updatePlayBtn(); 
              updateMediaSession();
            }
          },
          'pause': () => { 
            el.audio.pause(); 
            state.isPlaying = false; 
            updatePlayBtn(); 
            updateMediaSession();
          },
          'previoustrack': () => {
            if (state.isTransitioning || state.isLoading || state.isAnalyzing) return;
            if (state.segments.length === 0) return;
            prevSegment();
            setTimeout(() => updateMediaSession(), 300);
          },
          'nexttrack': () => {
            if (state.isTransitioning || state.isLoading || state.isAnalyzing) return;
            if (state.segments.length === 0) return;
            nextSegment();
            setTimeout(() => updateMediaSession(), 300);
          },
          'seekbackward': (details) => {
            if (state.isTransitioning || state.isLoading || state.isAnalyzing) return;
            const seg = getCurrentSegment();
            const offset = details && details.seekOffset ? details.seekOffset : 5;
            el.audio.currentTime = Math.max(seg.start, el.audio.currentTime - offset);
            setTimeout(() => updateMediaSession(), 100);
          },
          'seekforward': (details) => {
            if (state.isTransitioning || state.isLoading || state.isAnalyzing) return;
            const seg = getCurrentSegment();
            const offset = details && details.seekOffset ? details.seekOffset : 5;
            el.audio.currentTime = Math.min(seg.end, el.audio.currentTime + offset);
            setTimeout(() => updateMediaSession(), 100);
          }
        };
        
        try { navigator.mediaSession.setActionHandler('play', actions.play); } catch(e) {}
        try { navigator.mediaSession.setActionHandler('pause', actions.pause); } catch(e) {}
        try { navigator.mediaSession.setActionHandler('previoustrack', actions.previoustrack); } catch(e) {}
        try { navigator.mediaSession.setActionHandler('nexttrack', actions.nexttrack); } catch(e) {}
        try { navigator.mediaSession.setActionHandler('seekbackward', actions.seekbackward); } catch(e) {}
        try { navigator.mediaSession.setActionHandler('seekforward', actions.seekforward); } catch(e) {}
        
        state.mediaSessionInitialized = true;
      }

      function updateMediaSession() {
        if (!('mediaSession' in navigator)) return;
        
        const file = state.files[state.currentFileIdx];
        const segIdx = state.currentSegIdx + 1;
        const total = state.segments.length;
        const displayRepeat = Math.min(state.repeatCount + 1, state.settings.n);
        const fileCount = state.files.length;
        
        let title = file ? file.name : 'HablaSlice';
        let artist = `Seg ${segIdx}/${total} • Repeat ${displayRepeat}/${state.settings.n}`;
        let album = `Speed: ${state.speed.toFixed(2)}x`;
        
        if (fileCount > 1) {
          artist += ` • ${state.currentFileIdx+1}/${fileCount}`;
        }
        
        try {
          const metadata = new MediaMetadata({
            title: title,
            artist: artist,
            album: album,
            artwork: [
              { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
              { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
            ]
          });
          navigator.mediaSession.metadata = metadata;
        } catch(e) {}
        
        try {
          navigator.mediaSession.playbackState = state.isPlaying ? "playing" : "paused";
        } catch(e) {}
        
        try {
          if ('setPositionState' in navigator.mediaSession) {
            const seg = getCurrentSegment();
            navigator.mediaSession.setPositionState({
              duration: seg.end - seg.start,
              playbackRate: state.speed,
              position: Math.max(0, el.audio.currentTime - seg.start)
            });
          }
        } catch(e) {}
      }

      // ============================================================
      // TIME UPDATE
      // ============================================================
      let lastUpdateTime = 0;
      
      el.audio.addEventListener('timeupdate', function() {
        if (state.currentSegIdx === -1 || state.isUserSeeking || state.isTransitioning) return;
        if (state.isLoading || state.isAnalyzing) return;
        
        const now = Date.now();
        if (now - lastUpdateTime < 50) return;
        lastUpdateTime = now;
        
        const seg = getCurrentSegment();
        
        if (!isNaN(el.audio.duration) && el.audio.duration > 0) {
          const globalPct = (el.audio.currentTime / el.audio.duration) * 100;
          el.progressFill.style.width = Math.min(globalPct, 100) + '%';
          el.progressText.textContent = Math.round(globalPct) + '%';
        }
        
        if (seg && seg.end > seg.start) {
          const progressInSeg = Math.max(0, el.audio.currentTime - seg.start);
          const total = seg.end - seg.start;
          if (total > 0) {
            el.timeInfo.textContent = `${progressInSeg.toFixed(1)}s / ${total.toFixed(1)}s`;
            const pct = (progressInSeg / total) * 100;
            el.waveProgress.style.width = Math.min(pct, 100) + '%';
          }
        }
        
        advanceToNextSegment();
        
        if (state.isPlaying && state.mediaSessionInitialized && now - lastUpdateTime > 200) {
          updateMediaSession();
        }
      });

      // ============================================================
      // WAKE LOCK
      // ============================================================
      let wakeLock = null;
      
      async function requestWakeLock() {
        if ('wakeLock' in navigator && state.isPlaying) {
          try {
            if (wakeLock) {
              try { await wakeLock.release(); } catch(e) {}
              wakeLock = null;
            }
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => {
              if (state.isPlaying) requestWakeLock();
            });
          } catch (err) {
            console.log('Wake Lock error:', err);
          }
        }
      }

      // ============================================================
      // EVENTS
      // ============================================================
      el.audio.addEventListener('play', () => {
        state.isPlaying = true;
        updatePlayBtn();
        updateMediaSession();
        requestWakeLock();
        setTimeout(() => updateMediaSession(), 200);
      });

      el.audio.addEventListener('pause', () => {
        state.isPlaying = false;
        updatePlayBtn();
        updateMediaSession();
        savePlaybackState();
      });

      el.audio.addEventListener('ended', () => {
        state.isPlaying = false;
        updatePlayBtn();
        updateMediaSession();
      });

      el.audio.addEventListener('error', (e) => {
        console.error('Audio error:', e);
        if (state.isPlaying) {
          state.isPlaying = false;
          updatePlayBtn();
          updateStatusText('Playback error');
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && state.isPlaying && el.audio.paused && !state.isTransitioning && !state.isLoading && !state.isAnalyzing) {
          const seg = getCurrentSegment();
          el.audio.currentTime = seg.start;
          el.audio.play().catch(() => {});
        }
        if (state.segments.length > 0) {
          updateMediaSession();
        }
      });

      // ============================================================
      // QUICK CONTROLS
      // ============================================================
      initDropdown(el.speedDropdown, el.speedMenu, el.speedToggle, el.speedDisplay, function(value) {
        const val = parseFloat(value);
        state.speed = val;
        state.settings.speed = val;
        el.audio.playbackRate = val;
        saveSettings();
        updateMediaSession();
      });

      initDropdown(el.repeatsDropdown, el.repeatsMenu, el.repeatsToggle, el.repeatsDisplay, function(value) {
        const val = parseInt(value);
        state.settings.n = val;
        el.repeatTotal.textContent = val;
        saveSettings();
        updateRepeatInfo();
        updateMediaSession();
      });

      // ============================================================
      // POPOVER & FILE INPUTS
      // ============================================================
      function togglePopover(e) {
        e.stopPropagation();
        const rect = el.btnOpen.getBoundingClientRect();
        const pop = el.popover;
        const isOpen = pop.classList.contains('active');
        if (isOpen) { pop.classList.remove('active'); return; }
        pop.classList.add('active');
        const popRect = pop.getBoundingClientRect();
        let left = rect.right - popRect.width;
        let top = rect.top - popRect.height - 8;
        if (top < 10) top = rect.bottom + 8;
        if (left < 10) left = 10;
        pop.style.left = left + 'px';
        pop.style.top = top + 'px';
      }

      el.btnOpen.addEventListener('click', togglePopover);
      document.addEventListener('click', (e) => {
        if (!el.popover.contains(e.target) && e.target !== el.btnOpen && !el.btnOpen.contains(e.target)) {
          el.popover.classList.remove('active');
        }
      });

      el.popFile.addEventListener('click', () => {
        el.popover.classList.remove('active');
        el.fileInput.click();
      });
      
      el.popFolder.addEventListener('click', () => {
        el.popover.classList.remove('active');
        el.folderInput.click();
      });

      function handleFiles(input) {
        const files = Array.from(input.files).filter(f => 
          f.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|flac|aac|opus|webm)$/i.test(f.name)
        );
        if (!files.length) return;
        
        state.files = files.sort((a, b) => a.name.localeCompare(b.name));
        state.cache = {};
        state.isTransitioning = false;
        state.isLoading = false;
        state.loadPromise = null;
        loadFile(0);
        input.value = '';
        savePlaybackState();
      }

      el.fileInput.addEventListener('change', function() { handleFiles(this); });
      el.folderInput.addEventListener('change', function() { handleFiles(this); });

      // ============================================================
      // CONTROLS BUTTONS
      // ============================================================
      el.btnPlay.addEventListener('click', togglePlay);
      el.btnPrev.addEventListener('click', prevSegment);
      el.btnNext.addEventListener('click', nextSegment);
      el.btnLoop.addEventListener('click', () => {
        state.loopFile = !state.loopFile;
        el.btnLoop.style.opacity = state.loopFile ? '1' : '.4';
        updateStatusText(state.loopFile ? 'Loop: ON' : 'Loop: OFF');
        setTimeout(() => { if (state.segments.length > 0) updateStatusText('Ready'); }, 1000);
      });
      el.btnLoop.style.opacity = '.4';

      // ============================================================
      // SETTINGS MODAL
      // ============================================================
      el.btnSettings.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        el.setDb.value = state.settings.db;
        el.setDur.value = state.settings.dur;
        el.setPad.value = state.settings.pad;
        el.setAfter.value = state.settings.after;
        
        el.dbVal.textContent = state.settings.db;
        el.durVal.textContent = parseFloat(state.settings.dur).toFixed(1);
        el.padVal.textContent = parseFloat(state.settings.pad).toFixed(2);
        
        el.settingsModal.classList.add('active');
        document.body.classList.add('no-scroll');
      });

      el.btnCancel.addEventListener('click', () => {
        el.settingsModal.classList.remove('active');
        document.body.classList.remove('no-scroll');
      });
      
      el.btnReset.addEventListener('click', resetToDefaults);

      el.btnApply.addEventListener('click', async () => {
        const oldSegSettings = {
          db: state.settings.db,
          dur: state.settings.dur,
          pad: state.settings.pad
        };
        
        const newSegSettings = {
          db: parseInt(el.setDb.value),
          dur: parseFloat(el.setDur.value),
          pad: parseFloat(el.setPad.value)
        };
        
        const newAfter = el.setAfter.value;
        
        state.settings.after = newAfter;
        
        const needsResegment = 
          oldSegSettings.db !== newSegSettings.db ||
          oldSegSettings.dur !== newSegSettings.dur ||
          oldSegSettings.pad !== newSegSettings.pad;
        
        if (needsResegment) {
          state.settings.db = newSegSettings.db;
          state.settings.dur = newSegSettings.dur;
          state.settings.pad = newSegSettings.pad;
        }
        
        saveSettings();
        applySettingsToUI();
        el.settingsModal.classList.remove('active');
        document.body.classList.remove('no-scroll');
        updateRepeatInfo();
        savePlaybackState();
        
        if (needsResegment && state.files.length > 0 && state.currentFileIdx < state.files.length) {
          await reanalyzeCurrentFile();
        } else if (state.segments.length > 0) {
          drawWaveform(state.currentSegIdx, state.segments);
        }
      });

      el.setDb.addEventListener('input', () => el.dbVal.textContent = el.setDb.value);
      el.setDur.addEventListener('input', () => el.durVal.textContent = parseFloat(el.setDur.value).toFixed(1));
      el.setPad.addEventListener('input', () => el.padVal.textContent = parseFloat(el.setPad.value).toFixed(2));

      document.querySelectorAll('.step-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.dataset.target;
          const dir = parseInt(btn.dataset.dir);
          const input = document.getElementById(targetId);
          if (!input) return;
          let step = parseFloat(input.step) || 1;
          let val = parseFloat(input.value) + (dir * step);
          val = Math.max(parseFloat(input.min), Math.min(parseFloat(input.max), val));
          input.value = val;
          input.dispatchEvent(new Event('input'));
          if (targetId === 'setDb') el.dbVal.textContent = val;
          else if (targetId === 'setDur') el.durVal.textContent = val.toFixed(1);
          else if (targetId === 'setPad') el.padVal.textContent = val.toFixed(2);
        });
      });

      el.themeDark.addEventListener('click', () => { state.settings.theme = 'dark'; applySettingsToUI(); });
      el.themeLight.addEventListener('click', () => { state.settings.theme = 'light'; applySettingsToUI(); });
      
      el.settingsModal.addEventListener('click', e => { 
        if (e.target === el.settingsModal) {
          el.settingsModal.classList.remove('active');
          document.body.classList.remove('no-scroll');
        }
      });

      // ============================================================
      // KEYBOARD CONTROLS
      // ============================================================
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.closest('.custom-dropdown')) return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowLeft') prevSegment();
        else if (e.code === 'ArrowRight') nextSegment();
      });

      // ============================================================
      // SERVICE WORKER
      // ============================================================
      if ('serviceWorker' in navigator) {
        const swCode = `
          const CACHE = 'hablaslice-v50';
          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE).then(cache => cache.addAll([
                '/',
                '/index.html',
                '/icon-192.png',
                '/icon-512.png'
              ])).then(() => self.skipWaiting())
            );
          });
          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys().then(keys => {
                return Promise.all(keys.map(key => {
                  if (key !== CACHE) return caches.delete(key);
                }));
              }).then(() => self.clients.claim())
            );
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline', {status: 503})))
            );
          });
        `;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      }

      // ============================================================
      // INIT
      // ============================================================
      function init() {
        loadSettings();
        updatePlayBtn();
        updateRepeatInfo();
        updateFileList();
        updateStatusText('Ready');
        
        if ('mediaSession' in navigator) {
          try {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: 'HablaSlice',
              artist: 'Ready to play',
              album: 'Select audio file',
              artwork: [
                { src: 'icon-192.png', sizes: '192x192', type: 'image/png' }
              ]
            });
          } catch(e) {}
        }
        
        const restored = restorePlaybackState();
        if (!restored) {
          el.emptyMsg.textContent = 'Open a file or folder to start';
        }
        
        setInterval(() => {
          if (state.segments.length > 0 && state.isPlaying) {
            updateMediaSession();
          }
        }, 2000);

        updateFileList();
        
        console.log('HablaSlice v25 FINAL FIX');
        console.log('✓ Settings button works');
        console.log('✓ NO OVERLAP between segments');
        console.log('✓ Auto-advance works correctly');
        console.log('✓ Padding adds silence at both ends WITHOUT shifting content');
        console.log('✓ Waveform shows correct content boundaries');
        console.log('✓ Clean transitions with pause-reset');
      }

      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }

    })();
  </script>
</body>
</html>
