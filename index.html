<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HablaSlice">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HablaSlice</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <style>
    /* ... все стили остаются без изменений ... */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --md-sys-color-primary: #4cc9f0;
      --md-sys-color-on-primary: #000000;
      --md-sys-color-surface: #000000;
      --md-sys-color-surface-dim: #0f0f0f;
      --md-sys-color-surface-container: #1a1a1a;
      --md-sys-color-surface-container-high: #2a2a2a;
      --md-sys-color-surface-container-highest: #3a3a4a;
      --md-sys-color-on-surface: #e8e8f0;
      --md-sys-color-on-surface-variant: #b0b0c0;
      --md-sys-color-outline: #3a3a4a;
      --md-sys-color-outline-variant: #2a2a3a;
      --md-sys-color-error: #e94560;
      --md-sys-color-surface-tint: #4cc9f0;
      --md-ref-typeface: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
    }
    
    body.light {
      --md-sys-color-primary: #4361ee;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-surface: #f5f5fa;
      --md-sys-color-surface-dim: #e0e0e8;
      --md-sys-color-surface-container: #ffffff;
      --md-sys-color-surface-container-high: #f0f0f5;
      --md-sys-color-surface-container-highest: #e0e0e8;
      --md-sys-color-on-surface: #1a1a2e;
      --md-sys-color-on-surface-variant: #404060;
      --md-sys-color-outline: #c0c0d0;
      --md-sys-color-outline-variant: #d0d0e0;
      --md-sys-color-surface-tint: #4361ee;
    }
    
    html, body { 
      height: 100%; 
      overflow: hidden;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }
    
    body {
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: var(--md-ref-typeface);
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.25s, color 0.25s;
      padding-top: var(--safe-area-inset-top);
      padding-bottom: var(--safe-area-inset-bottom);
      font-size: 18px;
    }
    
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; }
    
    .header {
      padding: 16px 20px;
      padding-top: max(16px, var(--safe-area-inset-top));
      background: var(--md-sys-color-surface-container);
      border-bottom: 1px solid var(--md-sys-color-outline);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 68px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    
    .header h1 { 
      font-size: 24px; 
      font-weight: 600; 
      letter-spacing: 0.2px; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }
    
    .header h1 svg {
      width: 30px;
      height: 30px;
      fill: var(--md-sys-color-primary);
    }
    
    .header h1 span { 
      font-size: 16px; 
      font-weight: 400; 
      color: var(--md-sys-color-on-surface-variant); 
    }
    
    .header .btn-icon {
      width: 52px; 
      height: 52px;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--md-sys-color-on-surface);
      display: flex; 
      align-items: center; 
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      z-index: 20;
    }
    
    .header .btn-icon:active { 
      background: var(--md-sys-color-surface-container-high); 
    }
    
    .header .btn-icon svg { 
      width: 26px; 
      height: 26px; 
      fill: currentColor; 
    }
    
    .status-bar {
      padding: 10px 20px;
      font-size: 15px;
      color: var(--md-sys-color-on-surface-variant);
      background: var(--md-sys-color-surface-dim);
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    
    .status-bar .status-content {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .progress-wrap {
      flex: 1;
      min-width: 60px;
      display: none;
      align-items: center;
      gap: 12px;
    }
    
    .progress-wrap.active { display: flex; }
    
    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--md-sys-color-outline);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--md-sys-color-primary);
      border-radius: 4px;
      transition: width 0.1s linear;
    }
    
    .progress-text { 
      font-size: 14px; 
      color: var(--md-sys-color-on-surface-variant); 
      min-width: 44px; 
      text-align: right; 
      font-variant-numeric: tabular-nums;
    }
    
    .spinner-small {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--md-sys-color-outline);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      flex-shrink: 0;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 10px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    
    .track-card {
      width: 100%;
      max-width: 600px;
      background: var(--md-sys-color-surface-container);
      border-radius: 22px;
      padding: 20px 22px 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .track-name { 
      font-size: 22px; 
      font-weight: 600; 
      letter-spacing: 0.1px; 
      word-break: break-word; 
      line-height: 1.3; 
    }
    
    .track-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    
    .seg-info { 
      font-size: 16px; 
      color: var(--md-sys-color-on-surface-variant); 
    }
    
    .repeat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 16px;
      background: var(--md-sys-color-surface-container-high);
      border-radius: 20px;
      font-size: 15px;
      border: 1px solid var(--md-sys-color-outline-variant);
    }
    
    .repeat-chip svg {
      width: 16px;
      height: 16px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    
    .repeat-chip b { 
      color: var(--md-sys-color-primary); 
    }
    
    .time-info { 
      font-size: 36px; 
      font-weight: 300; 
      font-variant-numeric: tabular-nums; 
      letter-spacing: 0.3px; 
      margin: 4px 0 2px 0;
    }
    
    .waveform-container {
      width: 100%;
      height: 90px;
      background: var(--md-sys-color-surface-dim);
      border-radius: 14px;
      overflow: hidden;
      margin: 4px 0 2px 0;
      position: relative;
      min-height: 60px;
      border: 1px solid var(--md-sys-color-outline-variant);
    }
    
    .waveform-container canvas { 
      width: 100%; 
      height: 100%; 
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    .waveform-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: rgba(76, 201, 240, 0.08);
      pointer-events: none;
      border-radius: 14px;
      transition: width 0.05s linear;
      border-right: 2px solid rgba(76, 201, 240, 0.3);
      z-index: 2;
    }
    
    .playlist {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }
    
    .playlist-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--md-sys-color-surface-container);
      border-radius: 16px;
      border: 1px solid transparent;
      transition: all 0.15s;
      cursor: pointer;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    
    .playlist-item:active { 
      background: var(--md-sys-color-surface-container-high); 
    }
    
    .playlist-item.current { 
      border-color: var(--md-sys-color-primary); 
      background: var(--md-sys-color-surface-container-high); 
    }
    
    .playlist-item .idx { 
      color: var(--md-sys-color-on-surface-variant); 
      font-weight: 500; 
      min-width: 30px; 
      font-size: 15px;
    }
    
    .playlist-item .name { 
      flex: 1; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    
    .playlist-item .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--md-sys-color-primary);
      opacity: 0.3;
      flex-shrink: 0;
    }
    
    .playlist-item.current .status-dot {
      opacity: 1;
      box-shadow: 0 0 10px var(--md-sys-color-primary);
    }
    
    .empty-msg { 
      color: var(--md-sys-color-on-surface-variant); 
      text-align: center; 
      padding: 40px 16px; 
      font-size: 18px; 
    }
    
    .controls-wrapper {
      flex-shrink: 0;
      background: var(--md-sys-color-surface-container);
      border-top: 1px solid var(--md-sys-color-outline);
      padding: 10px 16px max(14px, var(--safe-area-inset-bottom)) 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .custom-dropdown {
      position: relative;
      flex: 1;
      min-width: 80px;
    }
    
    .custom-dropdown .dropdown-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
      min-height: 44px;
      gap: 8px;
    }
    
    .custom-dropdown .dropdown-toggle:active {
      background: var(--md-sys-color-surface-container-high);
    }
    
    .custom-dropdown .dropdown-toggle .arrow {
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    
    .custom-dropdown .dropdown-toggle .arrow svg {
      width: 16px;
      height: 16px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    
    .custom-dropdown.open .dropdown-toggle .arrow {
      transform: rotate(180deg);
    }
    
    .custom-dropdown .dropdown-menu {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 12px;
      padding: 6px 0;
      max-height: 180px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
      min-width: 100%;
    }
    
    .custom-dropdown.open .dropdown-menu {
      display: block;
    }
    
    .custom-dropdown .dropdown-menu .item {
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      color: var(--md-sys-color-on-surface);
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .custom-dropdown .dropdown-menu .item:active,
    .custom-dropdown .dropdown-menu .item:hover {
      background: var(--md-sys-color-surface-container-high);
    }
    
    .custom-dropdown .dropdown-menu .item.selected {
      color: var(--md-sys-color-primary);
      font-weight: 600;
    }
    
    .custom-dropdown .dropdown-menu .item.selected::after {
      content: "✓";
      float: right;
      color: var(--md-sys-color-primary);
    }
    
    .quick-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 12px;
      background: var(--md-sys-color-surface-dim);
      border-radius: 16px;
      border: 1px solid var(--md-sys-color-outline-variant);
    }
    
    .quick-controls .qc-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    
    .quick-controls .qc-label {
      font-size: 15px;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      min-width: 56px;
    }
    
    .quick-controls .qc-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--md-sys-color-primary);
      min-width: 36px;
      text-align: center;
    }
    
    .quick-controls .qc-divider {
      width: 1px;
      height: 32px;
      background: var(--md-sys-color-outline-variant);
      flex-shrink: 0;
    }
    
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
    }
    
    .controls .spacer {
      width: 10px;
    }
    
    .ctrl-btn {
      background: transparent;
      border: none;
      color: var(--md-sys-color-on-surface);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .ctrl-btn:active { 
      background: var(--md-sys-color-surface-container-high); 
      transform: scale(0.92); 
    }
    
    .ctrl-btn.play-btn {
      width: 76px; 
      height: 76px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      box-shadow: 0 4px 20px rgba(76, 201, 240, 0.35);
    }
    
    .ctrl-btn.play-btn:active { 
      transform: scale(0.92); 
    }
    
    .ctrl-btn:disabled { 
      opacity: 0.25; 
      cursor: not-allowed; 
    }
    
    .ctrl-btn svg { 
      width: 32px; 
      height: 32px; 
      fill: currentColor; 
    }
    
    .ctrl-btn.play-btn svg { 
      width: 38px; 
      height: 38px; 
    }
    
    .ctrl-btn-small {
      width: 56px;
      height: 56px;
    }
    
    .ctrl-btn-small svg {
      width: 26px;
      height: 26px;
    }
    
    .loading-spinner-big {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--md-sys-color-outline);
      border-top-color: var(--md-sys-color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    
    .popover {
      position: fixed;
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 16px;
      padding: 8px 0;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 300;
      display: none;
      overflow: hidden;
    }
    
    .popover.active { display: block; }
    
    .popover-item {
      padding: 16px 22px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.1s;
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface);
      width: 100%;
      text-align: left;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    
    .popover-item:active { 
      background: var(--md-sys-color-surface-container-high); 
    }
    
    .popover-item svg { 
      width: 22px; 
      height: 22px; 
      fill: currentColor; 
    }
    
    .modal-bg {
      position: fixed; 
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    
    .modal-bg.active { display: flex; }
    
    .modal {
      background: var(--md-sys-color-surface-container);
      border-radius: 28px;
      padding: 24px 22px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      border: 1px solid var(--md-sys-color-outline);
    }
    
    .modal h2 { 
      font-size: 22px; 
      margin-bottom: 18px; 
      font-weight: 500; 
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .modal h2 svg {
      width: 26px;
      height: 26px;
      fill: var(--md-sys-color-primary);
    }
    
    .setting {
      margin-bottom: 16px;
      padding: 8px 4px;
      border-bottom: 1px solid var(--md-sys-color-outline);
    }
    
    .setting:last-of-type { border-bottom: none; }
    
    .setting .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .setting .label-row label { 
      font-size: 15px; 
      font-weight: 500; 
      color: var(--md-sys-color-on-surface-variant); 
    }
    
    .setting .label-row .value { 
      font-size: 16px; 
      font-weight: 600; 
      color: var(--md-sys-color-primary); 
      min-width: 44px; 
      text-align: right; 
    }
    
    .setting .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .setting .slider-row .step-btn {
      width: 38px; 
      height: 38px; 
      border-radius: 50%;
      border: 1px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-dim);
      color: var(--md-sys-color-on-surface);
      font-size: 20px; 
      font-weight: 600;
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-shrink: 0; 
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .setting .slider-row .step-btn:active { 
      background: var(--md-sys-color-surface-container-high); 
    }
    
    .setting input[type="range"] {
      flex: 1;
      height: 4px;
      background: var(--md-sys-color-outline);
      border-radius: 4px;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }
    
    .setting input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; 
      height: 24px;
      background: var(--md-sys-color-primary);
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    
    .setting input[type="range"]::-moz-range-thumb {
      width: 24px; 
      height: 24px;
      background: var(--md-sys-color-primary);
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    
    .theme-switch { display: flex; gap: 8px; }
    
    .theme-switch button {
      flex: 1; 
      padding: 12px; 
      background: var(--md-sys-color-surface-dim);
      color: var(--md-sys-color-on-surface);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 36px;
      font-size: 15px; 
      font-weight: 500;
      cursor: pointer; 
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .theme-switch button.active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border-color: var(--md-sys-color-primary);
    }
    
    .setting select {
      width: 100%;
      padding: 12px 14px;
      background: var(--md-sys-color-surface-dim);
      color: var(--md-sys-color-on-surface);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--md-sys-color-outline);
    }
    
    .modal-actions button {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 36px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .modal-actions button:active { opacity: 0.7; }
    
    .btn-primary { 
      background: var(--md-sys-color-primary); 
      color: var(--md-sys-color-on-primary); 
    }
    
    .btn-secondary { 
      background: var(--md-sys-color-surface-dim); 
      color: var(--md-sys-color-on-surface); 
      border: 1px solid var(--md-sys-color-outline) !important; 
    }
    
    .btn-reset { 
      background: var(--md-sys-color-error); 
      color: #fff; 
      flex: 0.3; 
    }
    
    input[type="file"] { display: none; }
    
    @media (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
    
    @media (max-width: 480px) {
      .header h1 { font-size: 20px; }

      .waveform-container { height: 70px; min-height: 50px; }
      .ctrl-btn { width: 54px; height: 54px; }

      .quick-controls .qc-divider { display: none; }
      .custom-dropdown .dropdown-toggle { font-size: 14px; padding: 6px 10px; min-height: 38px; }
      .custom-dropdown .dropdown-menu .item { padding: 8px 12px; font-size: 14px; }

    @media (max-width: 380px) {
      .ctrl-btn { width: 46px; height: 46px; }
      .ctrl-btn.play-btn { width: 58px; height: 58px; }
      .ctrl-btn svg { width: 24px; height: 24px; }
      .ctrl-btn.play-btn svg { width: 30px; height: 30px; }

      .custom-dropdown .dropdown-menu .item { padding: 6px 10px; font-size: 13px; }
    }
    
    .no-scroll { overflow: hidden; }
    
    .setting .hint {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.6;
      margin-top: 2px;

    .section-divider {

    .section-divider span {
